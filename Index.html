<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 10 Scorecard</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1, h2, h3 {
            text-align: center;
            margin-top: 0;
        }

        .setup-section, .game-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hidden {
            display: none !important;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button.success { background-color: var(--success); }
        button.danger { background-color: var(--danger); }

        .player-list-setup {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .player-list-setup li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--background);
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .round-tracker {
            background: var(--background);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px 8px;
            text-align: center;
        }

        th {
            background-color: #f1f5f9;
        }

        .score-input-row td {
            padding: 15px 8px;
        }

        .checkbox-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }

        .checkbox-container input {
            transform: scale(1.2);
        }

        .calc-btn {
            background: #64748b;
            padding: 5px 10px;
            font-size: 0.85rem;
            margin-top: 5px;
            display: inline-block;
        }

        /* Calculator Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .calc-grid button {
            background: #f1f5f9;
            color: var(--text);
            padding: 15px;
            font-size: 1.1rem;
        }

        .calc-grid button:hover {
            background: #e2e8f0;
        }

        .calc-display {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background: var(--background);
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phase 10 Scorecard</h1>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="setup-section">
        <h2>Game Setup</h2>
        <div class="input-group">
            <input type="text" id="player-name-input" placeholder="Enter player name" autofocus>
            <button type="button" id="add-player-btn">Add</button>
        </div>
        <ul id="player-list" class="player-list-setup"></ul>
        <button type="button" id="start-game-btn" class="success hidden" style="width: 100%;">Start Game</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="game-section hidden">
        <div class="round-tracker">
            Round <span id="round-number">1</span> — Dealer: <span id="dealer-name">None</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Phase</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="scoreboard-body">
                <!-- Dynamically filled -->
            </tbody>
        </table>

        <h3>End of Round Scoring</h3>
        <p style="text-align: center; margin: 0; color: #64748b; font-size: 0.9rem;">Check "Phase" if completed. Enter remaining card points.</p>
        
        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Phase Cleared?</th>
                    <th>Points to Add</th>
                </tr>
            </thead>
            <tbody id="scoring-body">
                <!-- Dynamically filled -->
            </tbody>
        </table>

        <button type="button" id="submit-round-btn" class="success" style="width: 100%; margin-top: 10px;">Submit Round</button>
    </div>
</div>

<!-- CALCULATOR MODAL -->
<div id="calc-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Card Score Calculator</h3>
        <div id="modal-player-name" style="text-align: center; font-weight: bold; margin-bottom: 5px;"></div>
        <div class="calc-display">Total: <span id="calc-total">0</span></div>
        
        <div class="calc-grid">
            <button onclick="addCardPoints(5)">1-9 (+5)</button>
            <button onclick="addCardPoints(10)">10-12 (+10)</button>
            <button onclick="addCardPoints(15)">Skip (+15)</button>
            <button onclick="addCardPoints(25)">Wild (+25)</button>
            <button onclick="clearCalc()" class="danger" style="grid-column: span 2; color: white;">Clear</button>
        </div>
        
        <div class="input-group">
            <button onclick="closeCalc(false)" class="danger" style="flex: 1;">Cancel</button>
            <button onclick="closeCalc(true)" class="success" style="flex: 1;">Apply</button>
        </div>
    </div>
</div>

<script>
    let players = [];
    let currentRound = 1;
    let dealerIndex = 0;
    let activeCalcInputId = null;
    let runningCalcScore = 0;

    // Phase descriptions for reference if needed
    const phaseDescriptions = [
        "1: 2 sets of 3",
        "2: 1 set of 3 + 1 run of 4",
        "3: 1 set of 4 + 1 run of 4",
        "4: 1 run of 7",
        "5: 1 run of 8",
        "6: 1 run of 9",
        "7: 2 sets of 4",
        "8: 7 cards of 1 color",
        "9: 1 set of 5 + 1 set of 2",
        "10: 1 set of 5 + 1 set of 3"
    ];

    // DOM Elements
    const nameInput = document.getElementById('player-name-input');
    const addPlayerBtn = document.getElementById('add-player-btn');
    const playerList = document.getElementById('player-list');
    const startGameBtn = document.getElementById('start-game-btn');
    const setupScreen = document.getElementById('setup-screen');
    const gameScreen = document.getElementById('game-screen');
    const scoreboardBody = document.getElementById('scoreboard-body');
    const scoringBody = document.getElementById('scoring-body');
    const roundNumberSpan = document.getElementById('round-number');
    const dealerNameSpan = document.getElementById('dealer-name');
    const submitRoundBtn = document.getElementById('submit-round-btn');
    
    const calcModal = document.getElementById('calc-modal');
    const calcTotalSpan = document.getElementById('calc-total');
    const modalPlayerName = document.getElementById('modal-player-name');

    // --- Setup Logic ---
    nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addPlayer();
    });
    addPlayerBtn.addEventListener('click', addPlayer);

    function addPlayer() {
        const name = nameInput.value.trim();
        if (!name) return;
        
        players.push({
            name: name,
            score: 0,
            phase: 1
        });

        nameInput.value = '';
        renderSetupList();
    }

    function removePlayer(index) {
        players.splice(index, 1);
        renderSetupList();
    }

    function renderSetupList() {
        playerList.innerHTML = '';
        players.forEach((player, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${player.name}</span>
                <button type="button" class="danger" style="padding: 3px 8px; font-size: 0.85rem;" onclick="removePlayer(${index})">Remove</button>
            `;
            playerList.appendChild(li);
        });

        if (players.length >= 2) {
            startGameBtn.classList.remove('hidden');
        } else {
            startGameBtn.classList.add('hidden');
        }
    }

    startGameBtn.addEventListener('click', () => {
        setupScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        initGame();
    });

    // --- Game Logic ---
    function initGame() {
        dealerIndex = Math.floor(Math.random() * players.length); // Random first dealer
        updateRoundHeader();
        renderScoreboard();
        renderScoringInputs();
    }

    function updateRoundHeader() {
        roundNumberSpan.innerText = currentRound;
        dealerNameSpan.innerText = players[dealerIndex].name;
    }

    function renderScoreboard() {
        scoreboardBody.innerHTML = '';
        players.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: bold;">${p.name}</td>
                <td><strong>${p.phase}</strong> <small style="display:block; color:#64748b;">${p.phase <= 10 ? 'Phase ' + p.phase : 'WINNER!'}</small></td>
                <td style="font-weight: bold; color: var(--primary);">${p.score}</td>
            `;
            scoreboardBody.appendChild(tr);
        });
    }

    function renderScoringInputs() {
        scoringBody.innerHTML = '';
        players.forEach((p, index) => {
            const tr = document.createElement('tr');
            tr.className = "score-input-row";
            tr.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td>
                    <div class="checkbox-container">
                        <input type="checkbox" id="phase-check-${index}" ${p.phase > 10 ? 'disabled' : ''}>
                        <label for="phase-check-${index}">Cleared</label>
                    </div>
                </td>
                <td>
                    <input type="number" id="points-input-${index}" value="0" min="0" step="5" style="width: 70px; padding: 6px; text-align: center; font-size: 1rem;">
                    <br>
                    <button type="button" class="calc-btn" onclick="openCalc(${index})">Calculator</button>
                </td>
            `;
            scoringBody.appendChild(tr);
        });
    }

    submitRoundBtn.addEventListener('click', () => {
        let roundWinners = [];
        
        // Update data
        players.forEach((p, index) => {
            const phaseCleared = document.getElementById(`phase-check-${index}`).checked;
            const pointsAdded = parseInt(document.getElementById(`points-input-${index}`).value) || 0;

            if (phaseCleared && p.phase <= 10) {
                p.phase += 1;
            }
            p.score += pointsAdded;

            if (p.phase > 10) {
                roundWinners.push(p);
            }
        });

        // Check for Game Over Conditions
        if (roundWinners.length > 0) {
            // If multiple people finish Phase 10 in the same round, lowest score wins
            roundWinners.sort((a, b) => a.score - b.score);
            alert(`🎉 Game Over! ${roundWinners[0].name} wins Phase 10 with a final score of ${roundWinners[0].score}!`);
            submitRoundBtn.disabled = true;
            submitRoundBtn.innerText = "Game Finished";
            renderScoreboard();
            return;
        }

        // Advance round
        currentRound += 1;
        dealerIndex = (dealerIndex + 1) % players.length;
        
        updateRoundHeader();
        renderScoreboard();
        renderScoringInputs();
    });

    // --- Calculator Logic ---
    function openCalc(playerIndex) {
        activeCalcInputId = `points-input-${playerIndex}`;
        modalPlayerName.innerText = `Calculating for ${players[playerIndex].name}`;
        runningCalcScore = 0;
        calcTotalSpan.innerText = runningCalcScore;
        calcModal.classList.remove('hidden');
    }

    function addCardPoints(points) {
        runningCalcScore += points;
        calcTotalSpan.innerText = runningCalcScore;
    }

    function clearCalc() {
        runningCalcScore = 0;
        calcTotalSpan.innerText = runningCalcScore;
    }

    function closeCalc(applyScore) {
        if (applyScore && activeCalcInputId) {
            document.getElementById(activeCalcInputId).value = runningCalcScore;
        }
        calcModal.classList.add('hidden');
        activeCalcInputId = null;
    }
</script>

</body>
</html>
